services:
  multi-agents:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multi-agents-app
    env_file:
      - .env
    # Para modo interactivo (si main.py espera input)
    stdin_open: true
    tty: true
    # Montar carpeta data_trading para persistir JSONs capturados
    volumes:
      - ./data_trading:/app/data_trading
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    environment:
      SEARXNG_BIND_ADDRESS: 0.0.0.0
      SEARXNG_BASE_URL: http://localhost:8888
      SEARXNG_LIMITER: "false"
      SEARXNG_PUBLIC_INSTANCE: "false"
    ports:
      - "8888:8080"
    restart: unless-stopped
