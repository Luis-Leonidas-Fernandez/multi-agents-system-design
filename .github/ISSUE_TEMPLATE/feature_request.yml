name: Feature Request
description: Propose a new feature or improvement
labels: ["enhancement", "status:needs-review"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checks
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I understand this issue needs `status:approved` before a PR can be opened
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: The pain point this feature solves. What are you trying to do that you can't?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How it should work from the user's perspective.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Supervisor / Graph
        - Agents
        - Security / HITL
        - AgentDoG
        - Persistence
        - Scraping
        - Analytics / Dashboard
        - Config / Environment
        - Tests
        - Documentation
        - CI / Workflows
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches or workarounds you considered.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, examples, references, or anything else.
